
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <title>TSN1</title>
    <style>
        :root {
            --st-primary: #10b981;
            --st-primary-glow: rgba(16, 185, 129, 0.55);
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #fff;
            -webkit-tap-highlight-color: transparent; }
        body { user-select: none; -webkit-user-select: none; }

        #stage { position: fixed; inset: 0; background: #000; cursor: none; }
        #stage.is-idle { cursor: none; }
        #stage:not(.is-idle) { cursor: default; }
        #player { width: 100%; height: 100%; background: #000; object-fit: contain; outline: none; }

        /* Native browser caption cue styling — same approach vidrock uses.
           ::cue applies to text inside native <track kind="subtitles">. */
        ::cue {
            background: rgba(0, 0, 0, 0.65);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 1.05em;
            line-height: 1.4;
            text-shadow: 0 1px 2px rgba(0,0,0,0.95);
        }
        /* Subtitle style panel */
        .st-ss { padding: 12px 14px; }
        .st-ss-label { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: rgba(255,255,255,.5); margin: 12px 0 7px; }
        .st-ss-label:first-child { margin-top: 0; }
        .st-ss-row { display: flex; gap: 7px; }
        .st-ss-row button { flex: 1; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); color: #fff; border-radius: 8px; padding: 9px 4px; cursor: pointer; font-weight: 600; line-height: 1; display: flex; align-items: center; justify-content: center; transition: background .15s, border-color .15s; }
        .st-ss-row button:hover { background: rgba(255,255,255,.12); }
        .st-ss-row button.on { background: var(--st-primary); border-color: var(--st-primary); }
        .st-ss-row#stSsColor button { padding: 8px; }
        .st-ss-row#stSsColor button i { width: 18px; height: 18px; border-radius: 50%; display: block; border: 1px solid rgba(255,255,255,.35); }
        /* Move subtitles up when bottom controls visible */
        .is-ui-visible .st-sub { bottom: 130px; }
        @media (max-width: 720px) {
            .st-sub { bottom: 80px; font-size: clamp(13px, 3.5vw, 18px); }
            .is-ui-visible .st-sub { bottom: 110px; }
        }

        /* ============ Storm branding (top-left) ============ */
        .st-brand {
            position: absolute; top: 18px; left: 22px; z-index: 8;
            display: flex; align-items: center; gap: 9px;
            font-size: 13px; font-weight: 700; letter-spacing: 0.06em;
            color: rgba(255,255,255,0.95); text-shadow: 0 2px 8px rgba(0,0,0,0.7);
            pointer-events: none; opacity: 0; transition: opacity 0.25s ease;
        }
        .is-ui-visible .st-brand { opacity: 1; }
        .st-brand .dot {
            width: 9px; height: 9px; border-radius: 50%; background: var(--st-primary);
            box-shadow: 0 0 14px var(--st-primary);
            animation: stDotPulse 2.4s ease-in-out infinite;
        }
        @keyframes stDotPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.65; transform: scale(0.85); } }
        .st-brand .meta { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.65);
            letter-spacing: 0.02em; max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* ============ Server switcher (top-right) ============ */
        .st-servers {
            position: absolute; top: 18px; right: 22px; z-index: 8;
            display: flex; flex-direction: column; gap: 6px;
            opacity: 0; transition: opacity 0.25s ease; pointer-events: none;
        }
        .is-ui-visible .st-servers { opacity: 1; pointer-events: auto; }
        .st-server-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
            color: rgba(255,255,255,0.55); text-shadow: 0 2px 4px rgba(0,0,0,0.7);
            text-align: right; margin-bottom: 4px; }
        .st-servers button {
            background: rgba(20,20,28,0.78); border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(12px) saturate(1.4); -webkit-backdrop-filter: blur(12px) saturate(1.4);
            color: #fff; padding: 7px 14px; border-radius: 8px;
            font-size: 12px; font-weight: 500; cursor: pointer;
            transition: background 0.18s ease, border-color 0.18s ease;
            min-width: 110px; line-height: 1;
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
        }
        .st-servers button:hover { background: rgba(16,185,129,0.25); border-color: rgba(16,185,129,0.5); }
        .st-servers button.is-active {
            background: linear-gradient(135deg, #10b981, #059669);
            border-color: var(--st-primary);
            box-shadow: 0 6px 20px -4px rgba(16,185,129,0.5);
        }
        .st-servers .badge { font-size: 9px; padding: 1px 5px; border-radius: 4px;
            background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.75); font-weight: 600; }
        .st-servers button.is-active .badge { background: rgba(255,255,255,0.28); color: #fff; }

        /* ============ Big play button (center, when paused) ============ */
        .st-big-play {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 84px; height: 84px; border-radius: 50%;
            background: var(--st-primary);
            border: 0; cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 0 0 var(--st-primary-glow), 0 20px 50px -10px rgba(0,0,0,0.5);
            transition: transform 0.2s ease, opacity 0.3s ease;
            opacity: 0; pointer-events: none;
            animation: stPlayPulse 2.5s ease-out infinite;
        }
        .is-paused:not(.is-loading):not(.is-ended) .st-big-play { opacity: 1; pointer-events: auto; }
        .st-big-play:hover { transform: translate(-50%, -50%) scale(1.08); }
        .st-big-play svg { width: 36px; height: 36px; fill: #fff; margin-left: 4px; }
        @keyframes stPlayPulse {
            0% { box-shadow: 0 0 0 0 var(--st-primary-glow), 0 20px 50px -10px rgba(0,0,0,0.5); }
            70% { box-shadow: 0 0 0 22px rgba(16, 185, 129, 0), 0 20px 50px -10px rgba(0,0,0,0.5); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0), 0 20px 50px -10px rgba(0,0,0,0.5); }
        }

        /* ============ Episode picker — Cineby-style side panel ============ */
        .st-ep-panel {
            position: absolute; top: 0; right: 0; bottom: 0;
            width: 420px; max-width: 92vw; z-index: 90;
            background: rgba(14, 14, 20, 0.96);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border-left: 1px solid rgba(255,255,255,0.08);
            box-shadow: -20px 0 60px -10px rgba(0,0,0,0.6);
            transform: translateX(100%);
            transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        .st-ep-panel.is-open { transform: translateX(0); }
        .st-ep-panel-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 20px; gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .st-ep-panel-title {
            font-size: 15px; font-weight: 600;
            display: flex; align-items: center; gap: 10px;
        }
        .st-ep-panel-title .pill {
            font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
            padding: 3px 8px; border-radius: 999px;
            background: rgba(16,185,129,0.2); color: var(--st-primary);
        }
        .st-ep-panel-close {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
            width: 32px; height: 32px; border-radius: 8px;
            color: rgba(255,255,255,0.75); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .st-ep-panel-close:hover { background: rgba(255,255,255,0.12); color: #fff; }
        .st-ep-panel-close svg { width: 16px; height: 16px; fill: currentColor; }

        .st-season-tabs {
            display: flex; gap: 6px; padding: 14px 20px 8px;
            overflow-x: auto; scrollbar-width: thin;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .st-season-tabs::-webkit-scrollbar { height: 4px; }
        .st-season-tabs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }
        .st-season-tab {
            flex-shrink: 0; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.7);
            padding: 7px 14px; border-radius: 999px;
            font-size: 12px; font-weight: 500; cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
        }
        .st-season-tab:hover { background: rgba(16,185,129,0.18); color: #fff; }
        .st-season-tab.is-current {
            background: var(--st-primary); border-color: var(--st-primary); color: #fff;
            box-shadow: 0 6px 20px -6px rgba(16,185,129,0.6);
        }

        .st-ep-list {
            flex: 1; overflow-y: auto; padding: 8px 14px 14px;
            scrollbar-width: thin;
            display: flex; flex-direction: column; gap: 6px;
        }
        .st-ep-list::-webkit-scrollbar { width: 6px; }
        .st-ep-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }

        .st-ep-card {
            display: flex; gap: 12px; align-items: stretch;
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px; padding: 8px;
            cursor: pointer; text-decoration: none;
            transition: background 0.18s ease, border-color 0.18s ease, transform 0.15s ease;
            color: #fff;
        }
        .st-ep-card:hover {
            background: rgba(16,185,129,0.12);
            border-color: rgba(16,185,129,0.3);
            transform: translateX(-2px);
        }
        .st-ep-card.is-current {
            background: rgba(16,185,129,0.18);
            border-color: var(--st-primary);
        }
        .st-ep-card.is-current::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0;
            width: 3px; background: var(--st-primary); border-radius: 3px 0 0 3px;
        }
        .st-ep-thumb {
            flex-shrink: 0; width: 130px; aspect-ratio: 16 / 9;
            border-radius: 7px; overflow: hidden; position: relative;
            background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
        }
        .st-ep-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        .st-ep-thumb-num {
            position: absolute; bottom: 4px; left: 4px;
            background: rgba(0,0,0,0.78); color: #fff;
            font-size: 10px; font-weight: 700;
            padding: 2px 6px; border-radius: 4px;
            letter-spacing: 0.05em;
        }
        .st-ep-thumb-playing {
            position: absolute; top: 4px; right: 4px;
            background: var(--st-primary); color: #fff;
            font-size: 9px; font-weight: 700;
            padding: 2px 6px; border-radius: 4px;
            letter-spacing: 0.06em; text-transform: uppercase;
            display: none;
        }
        .st-ep-card.is-current .st-ep-thumb-playing { display: block; }
        .st-ep-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: space-between; padding: 2px 0; }
        .st-ep-info-top {
            display: flex; align-items: center; gap: 8px;
            font-size: 11px; color: rgba(255,255,255,0.55);
            font-weight: 600; letter-spacing: 0.03em;
        }
        .st-ep-card.is-current .st-ep-info-top { color: var(--st-primary); }
        .st-ep-title {
            font-size: 13px; font-weight: 600;
            color: #fff; line-height: 1.3;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; margin: 4px 0;
        }
        .st-ep-overview {
            font-size: 11px; color: rgba(255,255,255,0.45);
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; line-height: 1.4;
        }
        .st-ep-runtime {
            font-size: 11px; color: rgba(255,255,255,0.55);
        }

        /* Trigger button on the player */
        .st-ep-trigger {
            display: flex; align-items: center; gap: 6px;
            background: transparent; border: 0; color: #fff;
            font-size: 12px; font-weight: 500;
            padding: 0 12px; height: 36px; border-radius: 8px;
            cursor: pointer; transition: background 0.15s ease;
        }
        .st-ep-trigger:hover { background: rgba(255,255,255,0.12); }
        .st-ep-trigger svg { width: 18px; height: 18px; fill: currentColor; }

        /* ============ Bottom control bar ============ */
        .st-controls {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 7;
            padding: 60px 22px 14px;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .is-ui-visible .st-controls { opacity: 1; pointer-events: auto; }

        /* Progress bar */
        .st-progress {
            position: relative; width: 100%; height: 14px; cursor: pointer;
            display: flex; align-items: center;
            margin-bottom: 4px;
        }
        .st-progress-track {
            position: relative; width: 100%; height: 4px;
            background: rgba(255,255,255,0.18); border-radius: 999px;
            overflow: hidden;
            transition: height 0.15s ease;
        }
        .st-progress:hover .st-progress-track { height: 6px; }
        .st-progress-buffered {
            position: absolute; top: 0; bottom: 0; left: 0;
            background: rgba(255,255,255,0.28); border-radius: 999px;
            transition: width 0.15s ease;
        }
        .st-progress-played {
            position: absolute; top: 0; bottom: 0; left: 0;
            background: var(--st-primary); border-radius: 999px;
        }
        .st-progress-knob {
            position: absolute; top: 50%; transform: translate(-50%, -50%) scale(0);
            width: 13px; height: 13px; background: #fff;
            border-radius: 50%; pointer-events: none;
            transition: transform 0.18s ease;
            box-shadow: 0 0 0 4px var(--st-primary), 0 2px 6px rgba(0,0,0,0.4);
        }
        .st-progress:hover .st-progress-knob { transform: translate(-50%, -50%) scale(1); }
        .st-progress-tooltip {
            position: absolute; bottom: 18px; transform: translateX(-50%);
            background: rgba(20,20,28,0.95); border: 1px solid rgba(255,255,255,0.08);
            padding: 4px 8px; border-radius: 6px;
            font-size: 11px; font-variant-numeric: tabular-nums;
            opacity: 0; pointer-events: none; transition: opacity 0.15s ease;
            white-space: nowrap;
        }
        .st-progress:hover .st-progress-tooltip { opacity: 1; }

        /* Control row */
        .st-ctrl-row {
            display: flex; align-items: center; gap: 14px;
            margin-top: 6px;
        }
        .st-btn {
            background: transparent; border: 0; color: #fff;
            width: 36px; height: 36px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
            transition: background 0.15s ease, transform 0.1s ease;
        }
        .st-btn:hover { background: rgba(255,255,255,0.12); }
        .st-btn:active { transform: scale(0.94); }
        .st-btn svg { width: 22px; height: 22px; fill: currentColor; }
        .st-btn.st-btn-lg { width: 42px; height: 42px; }
        .st-btn.st-btn-lg svg { width: 26px; height: 26px; }

        /* Time display */
        .st-time {
            font-size: 13px; font-variant-numeric: tabular-nums;
            color: rgba(255,255,255,0.9);
            letter-spacing: 0.02em;
            margin-left: 4px;
        }
        .st-time .sep { opacity: 0.45; margin: 0 4px; }

        /* Volume control */
        .st-volume { display: flex; align-items: center; gap: 0; position: relative; }
        .st-volume-slider {
            width: 0; overflow: hidden;
            transition: width 0.2s ease, margin 0.2s ease;
            height: 36px; display: flex; align-items: center;
        }
        .st-volume:hover .st-volume-slider { width: 80px; margin-left: 4px; }
        .st-volume-bar {
            position: relative; width: 100%; height: 4px;
            background: rgba(255,255,255,0.2); border-radius: 999px; cursor: pointer;
        }
        .st-volume-fill { position: absolute; top: 0; left: 0; height: 100%; background: #fff; border-radius: 999px; }

        .st-spacer { flex: 1; }

        /* Settings popup */
        .st-popup {
            position: absolute; bottom: 64px; right: 22px; z-index: 9;
            background: rgba(18,18,24,0.97); border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(16px) saturate(1.4); border-radius: 12px;
            min-width: 220px; max-height: 70vh; overflow: hidden;
            box-shadow: 0 20px 50px -10px rgba(0,0,0,0.6);
            opacity: 0; pointer-events: none; transform: translateY(8px);
            transition: opacity 0.18s ease, transform 0.18s ease;
        }
        .st-popup.is-open { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .st-popup-page { display: none; padding: 6px 0; max-height: 70vh; overflow-y: auto; }
        .st-popup-page.is-active { display: block; }
        .st-popup-page::-webkit-scrollbar { width: 6px; }
        .st-popup-page::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
        .st-popup-header {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 12px 8px; border-bottom: 1px solid rgba(255,255,255,0.06);
            font-size: 12px; font-weight: 600;
            color: rgba(255,255,255,0.9);
        }
        .st-popup-back {
            background: transparent; border: 0; color: rgba(255,255,255,0.7);
            cursor: pointer; padding: 2px; display: flex; align-items: center;
            border-radius: 4px;
        }
        .st-popup-back:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .st-popup-back svg { width: 16px; height: 16px; fill: currentColor; }
        .st-popup button.st-popup-row {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; padding: 9px 14px; background: transparent; border: 0;
            color: #fff; font-size: 13px; cursor: pointer; text-align: left;
            transition: background 0.12s ease;
        }
        .st-popup button.st-popup-row:hover { background: rgba(16,185,129,0.18); }
        .st-popup button.is-current { color: var(--st-primary); font-weight: 600; }
        .st-popup button.is-current::after { content: '✓'; font-weight: 700; }
        .st-popup .row-value {
            color: rgba(255,255,255,0.6); font-size: 12px;
            display: flex; align-items: center; gap: 4px;
        }
        .st-popup .row-value svg { width: 14px; height: 14px; fill: currentColor; opacity: 0.6; }

        /* ============ Loading / error overlay ============ */
        .st-overlay {
            position: absolute; inset: 0; z-index: 50;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 18px; background: rgba(0,0,0,0.78); padding: 24px; text-align: center;
            transition: opacity 0.35s ease;
        }
        .st-overlay.is-hidden { opacity: 0; pointer-events: none; }
        .st-spinner {
            width: 54px; height: 54px;
            border: 3px solid rgba(255,255,255,0.12); border-top-color: var(--st-primary);
            border-radius: 50%; animation: stSpin 0.7s linear infinite;
        }
        @keyframes stSpin { to { transform: rotate(360deg); } }
        .st-overlay h2 { margin: 0; font-size: 17px; font-weight: 600; }
        .st-overlay p { margin: 0; font-size: 13px; color: rgba(255,255,255,0.65); max-width: 360px; line-height: 1.55; }
        .st-error-icon { width: 64px; height: 64px; border-radius: 50%; background: rgba(239,68,68,0.16);
            color: rgb(248,113,113); display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: 700; }

        /* "Tap to unmute" pill */
        .st-unmute {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, calc(-50% + 70px));
            background: rgba(20,20,28,0.92); border: 1px solid rgba(16,185,129,0.4);
            backdrop-filter: blur(12px); color: #fff;
            padding: 10px 18px 10px 14px; border-radius: 999px;
            font-size: 13px; font-weight: 500; cursor: pointer;
            box-shadow: 0 12px 32px -6px rgba(0,0,0,0.5), 0 0 30px -8px var(--st-primary);
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
            display: inline-flex; align-items: center; gap: 8px; z-index: 80;
        }
        .st-unmute.is-visible { opacity: 1; pointer-events: auto; }
        .st-unmute:hover { background: rgba(16,185,129,0.4); }
        .st-unmute svg { width: 18px; height: 18px; flex-shrink: 0; }

        /* Auto-next */
        .st-autonext {
            position: absolute; bottom: 100px; right: 22px; z-index: 60;
            background: rgba(20,20,28,0.94); border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(12px); padding: 14px 18px; border-radius: 12px;
            box-shadow: 0 12px 32px -8px rgba(0,0,0,0.5); min-width: 240px;
            opacity: 0; transform: translateY(10px); transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }
        .st-autonext.is-open { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .st-autonext-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--st-primary); text-transform: uppercase; margin-bottom: 4px; }
        .st-autonext-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: #fff; }
        .st-autonext-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 999px; overflow: hidden; margin-bottom: 10px; }
        .st-autonext-bar-fill { height: 100%; background: var(--st-primary); width: 100%; transition: width 0.1s linear; }
        .st-autonext-actions { display: flex; gap: 6px; }

            <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.18/dist/hls.min.js"></script>
        <script>
        (function () {
            const STREAMS = [{"url":"https:\/\/movish.net\/iptv-playlist\/111","label":"Live HD","type":"hls"}];
            const SUBS = [];
            const EPISODE_NAV = null;
            const META = {"title":"TSN1","cover":"https:\/\/i.imgur.com\/eRFE0jZ.png","episodeLabel":"","episodeName":""};
            const TMDB_ID = "111";
            const TYPE = "movie";
            // Which embed route this player is served from, so episode navigation
            // stays on the SAME source (Flux→/moviebox-embed, Storm→/vidrock-embed).
            const EMBED_BASE = "\/iptv-embed";
            // Live IPTV: no resume-to-position (the saved offset is meaningless
            // for a live edge) and no episode auto-next.
            const IS_LIVE = true;
            const RESUME_KEY = 'st_resume_' + TYPE + '_' + TMDB_ID +
                (EPISODE_NAV ? '_' + EPISODE_NAV.currentSeason + '_' + EPISODE_NAV.currentEpisode : '');

            // DOM refs
            const stage = document.getElementById('stage');
            const video = document.getElementById('player');
            const overlay = document.getElementById('stOverlay');
            const bigPlay = document.getElementById('stBigPlay');
            const playBtn = document.getElementById('stPlayBtn');
            const playIcon = document.getElementById('stPlayIcon');
            const fsIcon = document.getElementById('stFsIcon');
            const volIcon = document.getElementById('stVolIcon');
            const progress = document.getElementById('stProgress');
            const buffered = document.getElementById('stBuffered');
            const played = document.getElementById('stPlayed');
            const knob = document.getElementById('stKnob');
            const tooltip = document.getElementById('stProgressTooltip');
            const curEl = document.getElementById('stCur');
            const durEl = document.getElementById('stDur');
            const volBar = document.getElementById('stVolBar');
            const volFill = document.getElementById('stVolFill');
            const settingsBtn = document.getElementById('stSettings');
            const captionsBtn = document.getElementById('stCaptions');
            const popup = document.getElementById('stPopup');
            const serversBox = document.getElementById('stServers');
            const episodesBox = document.getElementById('stEpisodes');
            const unmuteBtn = document.getElementById('stUnmute');
            const autoNextDlg = document.getElementById('stAutonext');

            // State
            let hls = null;
            let currentStreamIdx = 0;
            let sourceErrorSent = false;
            let progressInterval = null;
            let hideUiTimer = null;
            let autoNextCountdown = null;
            let isDraggingProgress = false;

            // ============ Helpers ============
            function showOverlay(html) { overlay.innerHTML = html; overlay.classList.remove('is-hidden'); }
            function hideOverlay() { overlay.classList.add('is-hidden'); }
            function fmt(sec) {
                if (!isFinite(sec) || sec < 0) sec = 0;
                const h = Math.floor(sec / 3600);
                const m = Math.floor((sec % 3600) / 60);
                const s = Math.floor(sec % 60);
                return (h > 0 ? h + ':' + String(m).padStart(2, '0') : m) + ':' + String(s).padStart(2, '0');
            }
            function notifyParentError() {
                if (sourceErrorSent) return;
                sourceErrorSent = true;
                try { window.parent.postMessage({ type: 'source-error' }, '*'); } catch (e) {}
            }
            function setUiVisible(visible) {
                stage.classList.toggle('is-ui-visible', visible);
                stage.classList.toggle('is-idle', !visible);
            }
            function showUi() {
                setUiVisible(true);
                clearTimeout(hideUiTimer);
                if (!video.paused) hideUiTimer = setTimeout(() => setUiVisible(false), 3000);
            }
            function setPausedClass() {
                stage.classList.toggle('is-paused', video.paused);
                stage.classList.toggle('is-loading', video.readyState < 3 && !video.paused);
                stage.classList.toggle('is-ended', video.ended);
                playIcon.innerHTML = video.paused
                    ? '<path d="M8 5v14l11-7z"/>'
                    : '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            }

            // ============ Stream loading ============
            let bootTimeout = null;
            function loadStream(idx) {
                const s = STREAMS[idx];
                if (!s) {
                    showOverlay('<div class="st-error-icon">!</div><h2>All servers exhausted</h2><p>Rotating to next source…</p>');
                    notifyParentError();
                    return;
                }
                currentStreamIdx = idx;
                renderServers();
                showOverlay('<div class="st-spinner"></div><h2>Loading ' + s.label + '…</h2>');
                if (hls) { hls.destroy(); hls = null; }

                // Boot watchdog: if no segments have actually played within 10s,
                // this stream is dead (segment CDN broken, geo-blocked, etc.) —
                // rotate to next server. Cleared as soon as video starts playing.
                if (bootTimeout) clearTimeout(bootTimeout);
                bootTimeout = setTimeout(() => {
                    if (video.readyState < 3 || video.currentTime < 0.1) {
                        console.warn('Storm: boot watchdog fired — stream did not start in 10s, rotating');
                        loadStream(idx + 1);
                    }
                }, 10000);

                if (s.type === 'hls' && window.Hls && Hls.isSupported()) {
                    hls = new Hls({ maxBufferLength: 30, enableWorker: true });
                    try { if (IS_LIVE) hls.subtitleDisplay = false; } catch (e) {} // don't auto-show broadcaster captions on live
                    hls.loadSource(s.url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        rebuildQualityMenu();
                        hideOverlay();
                        tryAutoplay();
                    });
                    hls.on(Hls.Events.ERROR, (_e, d) => {
                        if (!d.fatal) return;
                        if (d.type === Hls.ErrorTypes.NETWORK_ERROR) { try { hls.startLoad(); return; } catch (e) {} }
                        if (d.type === Hls.ErrorTypes.MEDIA_ERROR) { try { hls.recoverMediaError(); return; } catch (e) {} }
                        setTimeout(() => loadStream(idx + 1), 600);
                    });
                } else if (s.type === 'hls' && video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = s.url;
                    video.addEventListener('loadedmetadata', () => { hideOverlay(); tryAutoplay(); }, { once: true });
                    rebuildQualityMenu();
                } else {
                    video.src = s.url;
                    video.addEventListener('loadedmetadata', () => { hideOverlay(); tryAutoplay(); }, { once: true });
                    rebuildQualityMenu();
                }
            }

            function tryAutoplay() {
                const p = video.play();
                if (p && p.catch) {
                    p.catch(() => {
                        try {
                            video.muted = true; updateVolIcon();
                            video.play().catch(() => {});
                            unmuteBtn.classList.add('is-visible');
                        } catch (e) {}
                    });
                }
            }

            // ============ Servers ============
            function renderServers() {
                if (!serversBox) return;
                const labelDiv = serversBox.querySelector('.st-server-label');
                serversBox.innerHTML = '';
                if (labelDiv) serversBox.appendChild(labelDiv);
                STREAMS.forEach((s, i) => {
                    const b = document.createElement('button');
                    if (i === currentStreamIdx) b.classList.add('is-active');
                    b.innerHTML = '<span>' + s.label + '</span><span class="badge">' + (s.type === 'hls' ? 'HLS' : 'MP4') + '</span>';
                    b.addEventListener('click', () => loadStream(i));
                    serversBox.appendChild(b);
                });
            }

            // ============ Cineby-style episode panel ============
            const SEASONS_RICH = [];
            const EPISODES_RICH = [];
            const epPanel = document.getElementById('stEpPanel');
            const epTrigger = document.getElementById('stEpTrigger');
            const epPanelClose = document.getElementById('stEpPanelClose');
            const seasonTabs = document.getElementById('stSeasonTabs');
            const epList = document.getElementById('stEpList');

            function openEpPanel() { epPanel?.classList.add('is-open'); }
            function closeEpPanel() { epPanel?.classList.remove('is-open'); }
            epTrigger?.addEventListener('click', openEpPanel);
            epPanelClose?.addEventListener('click', closeEpPanel);

            // Season tabs (highlight current; click navigates to S{n}E01)
            function renderSeasonTabs() {
                if (!seasonTabs) return;
                seasonTabs.innerHTML = '';
                const curSeason = EPISODE_NAV?.currentSeason ?? 1;
                SEASONS_RICH.forEach(s => {
                    const b = document.createElement('button');
                    b.className = 'st-season-tab' + (s.number === curSeason ? ' is-current' : '');
                    b.textContent = 'S' + String(s.number).padStart(2, '0');
                    b.addEventListener('click', () => {
                        if (s.number === curSeason) return;
                        location.href = EMBED_BASE + '/tv/' + TMDB_ID + '/' + s.number + '/1';
                    });
                    seasonTabs.appendChild(b);
                });
            }

            // Rich episode cards
            function renderEpisodeCards() {
                if (!epList) return;
                epList.innerHTML = '';
                const curSeason = EPISODE_NAV?.currentSeason ?? 1;
                const curEp = EPISODE_NAV?.currentEpisode ?? 1;
                EPISODES_RICH.forEach(ep => {
                    const a = document.createElement('a');
                    a.className = 'st-ep-card' + (ep.number === curEp ? ' is-current' : '');
                    a.href = EMBED_BASE + '/tv/' + TMDB_ID + '/' + curSeason + '/' + ep.number;
                    const img = ep.image
                        ? '<img src="' + ep.image + '" alt="" loading="lazy" onerror="this.remove()">'
                        : '';
                    a.innerHTML =
                        '<div class="st-ep-thumb">' + img +
                            '<div class="st-ep-thumb-num">EP ' + ep.number + '</div>' +
                            '<div class="st-ep-thumb-playing">Now</div>' +
                        '</div>' +
                        '<div class="st-ep-info">' +
                            '<div>' +
                                '<div class="st-ep-info-top">' +
                                    '<span>Episode ' + ep.number + '</span>' +
                                    (ep.runtime ? '<span>· ' + ep.runtime + 'm</span>' : '') +
                                '</div>' +
                                '<div class="st-ep-title">' + escapeHtml(ep.title) + '</div>' +
                            '</div>' +
                            (ep.overview ? '<div class="st-ep-overview">' + escapeHtml(ep.overview) + '</div>' : '') +
                        '</div>';
                    epList.appendChild(a);
                });
                requestAnimationFrame(() => {
                    const cur = epList.querySelector('.is-current');
                    if (cur) cur.scrollIntoView({ block: 'center', behavior: 'smooth' });
                });
            }
            function escapeHtml(s) {
                return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
            }

            // ============ Settings menus ============
            function rebuildQualityMenu() {
                const list = document.getElementById('stQualityList');
                list.innerHTML = '';
                const levels = hls?.levels || [];
                const entries = [{ label: 'Auto', value: -1 }];
                const seenHeights = new Set();
                levels.forEach((lvl, i) => {
                    if (lvl.height && !seenHeights.has(lvl.height)) {
                        seenHeights.add(lvl.height);
                        entries.push({ label: lvl.height + 'p', value: i });
                    }
                });
                const current = hls ? hls.currentLevel : -1;
                entries.forEach(e => {
                    const b = document.createElement('button');
                    b.className = 'st-popup-row';
                    if (e.value === current) b.classList.add('is-current');
                    b.innerHTML = '<span>' + e.label + '</span>';
                    b.addEventListener('click', () => {
                        if (hls) hls.currentLevel = e.value;
                        document.getElementById('stQualityValue').firstChild.textContent = e.label + ' ';
                        rebuildQualityMenu();
                        closePopup();
                    });
                    list.appendChild(b);
                });
            }
            function rebuildSpeedMenu() {
                const list = document.getElementById('stSpeedList');
                list.innerHTML = '';
                [0.25, 0.5, 0.75, 1, 1.25, 1.5, 1.75, 2].forEach(rate => {
                    const b = document.createElement('button');
                    b.className = 'st-popup-row';
                    if (Math.abs(video.playbackRate - rate) < 0.01) b.classList.add('is-current');
                    b.innerHTML = '<span>' + (rate === 1 ? 'Normal' : rate + '×') + '</span>';
                    b.addEventListener('click', () => {
                        video.playbackRate = rate;
                        document.getElementById('stSpeedValue').firstChild.textContent = (rate === 1 ? 'Normal' : rate + '×') + ' ';
                        rebuildSpeedMenu();
                        closePopup();
                    });
                    list.appendChild(b);
                });
            }
            function rebuildCaptionsMenu() {
                const list = document.getElementById('stCaptionsList');
                if (!list) return;
                list.innerHTML = '';
                const tracks = nativeTracks();
                // Off entry
                const off = document.createElement('button');
                off.className = 'st-popup-row';
                if (activeTrackIdx < 0) off.classList.add('is-current');
                off.innerHTML = '<span>Off</span>';
                off.addEventListener('click', () => {
                    setActiveSubtitle(-1);
                    closePopup();
                });
                list.appendChild(off);
                // Each loaded track
                tracks.forEach((t, idx) => {
                    const b = document.createElement('button');
                    b.className = 'st-popup-row';
                    if (idx === activeTrackIdx) b.classList.add('is-current');
                    b.innerHTML = '<span>' + (t.label || t.language || 'Subtitle') + '</span>';
                    b.addEventListener('click', () => {
                        setActiveSubtitle(idx);
                        closePopup();
                    });
                    list.appendChild(b);
                });
            }

            // Popup nav
            function openPopup() { popup.classList.add('is-open'); showPopupPage('stPopupMain'); }
            function closePopup() { popup.classList.remove('is-open'); }
            function showPopupPage(id) {
                document.querySelectorAll('.st-popup-page').forEach(p => p.classList.toggle('is-active', p.id === id));
            }
            settingsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (popup.classList.contains('is-open')) closePopup(); else openPopup();
            });
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#stPopup') && !e.target.closest('#stSettings')) closePopup();
            });
            document.querySelectorAll('[data-page]').forEach(b => {
                b.addEventListener('click', () => showPopupPage(b.dataset.page));
            });
            if (captionsBtn) {
                captionsBtn.addEventListener('click', () => {
                    openPopup(); showPopupPage('stPopupCaptions');
                });
            }

            // ============ Play / pause / mute / fullscreen ============
            function togglePlay() {
                if (video.paused) video.play().catch(() => {});
                else video.pause();
            }
            bigPlay.addEventListener('click', togglePlay);
            playBtn.addEventListener('click', togglePlay);
            // Single tap = play/pause; double tap (incl. touch) = fullscreen.
            let lastTapAt = 0, tapTimer = null;
            video.addEventListener('click', (e) => {
                if (e.target.closest('#stControls')) return;
                const now = Date.now();
                if (now - lastTapAt < 300) {
                    clearTimeout(tapTimer);
                    lastTapAt = 0;
                    toggleFullscreen();
                } else {
                    lastTapAt = now;
                    tapTimer = setTimeout(() => { togglePlay(); }, 280);
                }
            });

            document.getElementById('stRewind').addEventListener('click', () => { video.currentTime = Math.max(0, video.currentTime - 10); });
            document.getElementById('stForward').addEventListener('click', () => { video.currentTime = Math.min(video.duration || 0, video.currentTime + 10); });

            document.getElementById('stMute').addEventListener('click', () => {
                video.muted = !video.muted;
                if (!video.muted && video.volume === 0) video.volume = 0.5;
                updateVolIcon();
            });
            function updateVolIcon() {
                const v = video.muted ? 0 : video.volume;
                volFill.style.width = (v * 100) + '%';
                if (v === 0) volIcon.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
                else if (v < 0.5) volIcon.innerHTML = '<path d="M7 9v6h4l5 5V4l-5 5H7zm9 2.5c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>';
                else volIcon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
            }
            volBar.addEventListener('click', (e) => {
                const r = volBar.getBoundingClientRect();
                video.volume = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
                video.muted = false;
            });

            document.getElementById('stPip').addEventListener('click', async () => {
                try {
                    if (document.pictureInPictureElement) await document.exitPictureInPicture();
                    else await video.requestPictureInPicture();
                } catch (e) { console.warn('PIP error', e); }
            });

            // Fullscreen — iOS Safari has NO Fullscreen API on a <div>; only the
            // <video> element supports it (webkitEnterFullscreen). So try standard
            // element fullscreen first, then fall back to native video fullscreen
            // (iPhone). This is why the button "did nothing" on iPhone before.
            function inFullscreen() {
                return !!(document.fullscreenElement || document.webkitFullscreenElement || video.webkitDisplayingFullscreen);
            }
            function toggleFullscreen() {
                if (document.fullscreenElement || document.webkitFullscreenElement) {
                    (document.exitFullscreen || document.webkitExitFullscreen || function () {}).call(document);
                    return;
                }
                if (video.webkitDisplayingFullscreen) { try { video.webkitExitFullscreen(); } catch (e) {} return; }
                if (stage.requestFullscreen) { stage.requestFullscreen().catch(() => {}); }
                else if (stage.webkitRequestFullscreen) { stage.webkitRequestFullscreen(); }
                else if (video.webkitEnterFullscreen) { try { video.webkitEnterFullscreen(); } catch (e) {} } // iPhone
            }
            document.getElementById('stFullscreen').addEventListener('click', toggleFullscreen);
            // On phones, force landscape while fullscreen (iOS rotates its native
            // video player on its own; the lock call simply no-ops/throws there).
            const isPhone = window.matchMedia('(max-width: 820px)').matches || /Mobi|Android|iPhone|iPod/i.test(navigator.userAgent);
            function syncOrientation() {
                if (!isPhone || !screen.orientation) return;
                try {
                    if (inFullscreen()) {
                        const p = screen.orientation.lock && screen.orientation.lock('landscape');
                        if (p && p.catch) p.catch(() => {});
                    } else if (screen.orientation.unlock) {
                        screen.orientation.unlock();
                    }
                } catch (e) {}
            }
            function updateFsIcon() {
                fsIcon.innerHTML = inFullscreen()
                    ? '<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>'
                    : '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';
                syncOrientation();
            }
            document.addEventListener('fullscreenchange', updateFsIcon);
            document.addEventListener('webkitfullscreenchange', updateFsIcon);
            video.addEventListener('webkitbeginfullscreen', updateFsIcon);
            video.addEventListener('webkitendfullscreen', updateFsIcon);

            // ============ Progress bar ============
            function pctFromEvent(e) {
                const r = progress.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
                return Math.max(0, Math.min(1, x / r.width));
            }
            progress.addEventListener('click', (e) => {
                if (!isFinite(video.duration)) return;
                video.currentTime = pctFromEvent(e) * video.duration;
            });
            progress.addEventListener('mousemove', (e) => {
                const r = progress.getBoundingClientRect();
                const pct = pctFromEvent(e);
                tooltip.style.left = (pct * r.width) + 'px';
                tooltip.textContent = fmt(pct * (video.duration || 0));
            });
            progress.addEventListener('mousedown', () => { isDraggingProgress = true; });
            window.addEventListener('mouseup', () => { isDraggingProgress = false; });
            window.addEventListener('mousemove', (e) => {
                if (!isDraggingProgress) return;
                if (!isFinite(video.duration)) return;
                video.currentTime = pctFromEvent(e) * video.duration;
            });

            // ============ Video events ============
            video.addEventListener('play', () => { setPausedClass(); showUi(); startProgressReporting(); });
            video.addEventListener('playing', () => { if (bootTimeout) { clearTimeout(bootTimeout); bootTimeout = null; } });
            video.addEventListener('pause', () => { setPausedClass(); showUi(); stopProgressReporting(); });
            video.addEventListener('ended', () => { setPausedClass(); onVideoEnded(); });
            video.addEventListener('timeupdate', () => {
                if (!isFinite(video.duration)) return;
                const pct = (video.currentTime / video.duration) * 100;
                played.style.width = pct + '%';
                knob.style.left = pct + '%';
                curEl.textContent = fmt(video.currentTime);
            });
            video.addEventListener('progress', () => {
                if (video.buffered.length && isFinite(video.duration)) {
                    const end = video.buffered.end(video.buffered.length - 1);
                    buffered.style.width = ((end / video.duration) * 100) + '%';
                }
            });
            video.addEventListener('loadedmetadata', () => {
                durEl.textContent = fmt(video.duration);
                rebuildSpeedMenu();
                rebuildCaptionsMenu();
                // Resume position (skipped for live channels)
                if (!IS_LIVE) {
                    try {
                        const saved = JSON.parse(localStorage.getItem(RESUME_KEY) || 'null');
                        if (saved && saved.t > 10 && saved.t < video.duration - 30) video.currentTime = saved.t;
                    } catch (e) {}
                }
            });

            // ============ Native subtitle handling ============
            // Same approach vidrock itself uses: <track kind="subtitles"> elements
            // + textTracks API. Browser renders cues natively (including multi-line
            // dialogue). Files are already WebVTT — no client-side parsing.
            let activeTrackIdx = -1;

            function nativeTracks() {
                return Array.from(video.textTracks).filter(t => t.kind === 'subtitles' || t.kind === 'captions');
            }

            function setActiveSubtitle(idx) {
                const tracks = nativeTracks();
                // Disable all first
                tracks.forEach(t => { t.mode = 'disabled'; });
                if (idx < 0 || idx >= tracks.length) {
                    activeTrackIdx = -1;
                    const valEl = document.getElementById('stCaptionsValue');
                    if (valEl) valEl.firstChild.textContent = 'Off ';
                    rebuildCaptionsMenu();
                    return;
                }
                tracks[idx].mode = 'showing';
                activeTrackIdx = idx;
                const label = (tracks[idx].label || tracks[idx].language || 'On').slice(0, 14);
                const valEl = document.getElementById('stCaptionsValue');
                if (valEl) valEl.firstChild.textContent = label + ' ';
                rebuildCaptionsMenu();
            }

            // Auto-enable English (or first default track) once tracks have loaded.
            // textTracks list isn't always populated immediately — poll briefly.
            function activateDefaultTrack() {
                const tracks = nativeTracks();
                if (!tracks.length) return false;
                let englishIdx = tracks.findIndex(t => t.language === 'en' || /english/i.test(t.label));
                if (englishIdx < 0) englishIdx = 0;
                setActiveSubtitle(englishIdx);
                return true;
            }
            if (IS_LIVE) {
                // Live channels carry the broadcaster's own embedded captions
                // (CEA-608/708) — keep them OFF by default. Wrapped in try/catch
                // so it can never affect playback.
                try {
                    const disableLiveCaptions = () => nativeTracks().forEach(t => { try { t.mode = 'disabled'; } catch (e) {} });
                    disableLiveCaptions();
                    video.textTracks.addEventListener?.('addtrack', disableLiveCaptions);
                    let la = 0;
                    const lp = setInterval(() => { disableLiveCaptions(); if (++la > 24) clearInterval(lp); }, 250);
                } catch (e) {}
            } else if (!activateDefaultTrack()) {
                // VOD (movies / Flux / Storm): auto-enable English subtitles as before.
                video.textTracks.addEventListener?.('addtrack', activateDefaultTrack);
                let attempts = 0;
                const poll = setInterval(() => {
                    if (activateDefaultTrack() || ++attempts > 20) clearInterval(poll);
                }, 250);
            }
            video.addEventListener('volumechange', () => {
                updateVolIcon();
                if (!video.muted) unmuteBtn.classList.remove('is-visible');
            });
            video.addEventListener('waiting', () => stage.classList.add('is-loading'));
            video.addEventListener('canplay', () => stage.classList.remove('is-loading'));

            // ============ Mouse activity → show/hide UI ============
            ['mousemove', 'touchstart', 'pointermove'].forEach(evt => {
                stage.addEventListener(evt, showUi);
            });
            stage.addEventListener('mouseleave', () => {
                if (!video.paused) setUiVisible(false);
            });

            // ============ Keyboard ============
            window.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                switch (e.key) {
                    case ' ': case 'k': case 'K': e.preventDefault(); togglePlay(); break;
                    case 'ArrowLeft': video.currentTime = Math.max(0, video.currentTime - 5); break;
                    case 'ArrowRight': video.currentTime = Math.min(video.duration || 0, video.currentTime + 5); break;
                    case 'ArrowUp': e.preventDefault(); video.volume = Math.min(1, video.volume + 0.1); video.muted = false; break;
                    case 'ArrowDown': e.preventDefault(); video.volume = Math.max(0, video.volume - 0.1); break;
                    case 'm': case 'M': video.muted = !video.muted; updateVolIcon(); break;
                    case 'f': case 'F': document.getElementById('stFullscreen').click(); break;
                    case 'p': case 'P': document.getElementById('stPip').click(); break;
                    case 'c': case 'C': if (captionsBtn) captionsBtn.click(); break;
                }
                showUi();
            });

            // Progress reporting + auto-next
            function startProgressReporting() {
                if (progressInterval) clearInterval(progressInterval);
                progressInterval = setInterval(() => {
                    if (!video.duration || video.duration === Infinity) return;
                    try {
                        window.parent.postMessage({ type: 'progress', currentTime: video.currentTime, duration: video.duration }, '*');
                        localStorage.setItem(RESUME_KEY, JSON.stringify({ t: video.currentTime, at: Date.now() }));
                    } catch (e) {}
                }, 5000);
            }
            function stopProgressReporting() {
                if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
                if (video.duration) try { localStorage.setItem(RESUME_KEY, JSON.stringify({ t: video.currentTime, at: Date.now() })); } catch (e) {}
            }
            function onVideoEnded() {
                if (!EPISODE_NAV) return;
                const nextEp = EPISODE_NAV.currentEpisode + 1;
                const eps = EPISODE_NAV.seasons[EPISODE_NAV.currentSeason] || 0;
                let goTo = null;
                if (nextEp <= eps) goTo = { s: EPISODE_NAV.currentSeason, e: nextEp };
                else if (EPISODE_NAV.currentSeason + 1 <= EPISODE_NAV.totalSeasons) goTo = { s: EPISODE_NAV.currentSeason + 1, e: 1 };
                if (!goTo) return;
                document.getElementById('stAnTitle').textContent = 'S' + String(goTo.s).padStart(2, '0') + ' · E' + String(goTo.e).padStart(2, '0');
                autoNextDlg.classList.add('is-open');
                if (autoNextCountdown) clearInterval(autoNextCountdown);
                let remaining = 100;
                autoNextCountdown = setInterval(() => {
                    remaining -= 1;
                    document.getElementById('stAnBar').style.width = remaining + '%';
                    if (remaining % 10 === 0) document.getElementById('stAnSec').textContent = Math.ceil(remaining / 10);
                    if (remaining <= 0) {
                        clearInterval(autoNextCountdown);
                        location.href = EMBED_BASE + '/tv/' + TMDB_ID + '/' + goTo.s + '/' + goTo.e;
                    }
                }, 100);
                window.stTriggerAutoNext = () => { location.href = EMBED_BASE + '/tv/' + TMDB_ID + '/' + goTo.s + '/' + goTo.e; };
                window.stCancelAutoNext = () => {
                    autoNextDlg.classList.remove('is-open');
                    if (autoNextCountdown) clearInterval(autoNextCountdown);
                };
            }

            unmuteBtn.addEventListener('click', () => {
                try { video.muted = false; video.volume = 1; updateVolIcon(); video.play().catch(() => {}); } catch (e) {}
                unmuteBtn.classList.remove('is-visible');
            });

            // ============ Subtitle delay control ============
            let subDelaySec = 0;
            const subDelayKey = 'st_sub_delay_' + TYPE + '_' + TMDB_ID;
            try { subDelaySec = parseFloat(localStorage.getItem(subDelayKey) || '0') || 0; } catch (e) {}
            const subDelayVal = document.getElementById('stSubDelayValue');
            const subDelayMinus = document.getElementById('stSubDelayMinus');
            const subDelayPlus = document.getElementById('stSubDelayPlus');
            const subDelayReset = document.getElementById('stSubDelayReset');
            function fmtDelay(s) { return (s >= 0 ? '+' : '') + s.toFixed(1) + 's'; }
            function refreshDelayUi() { if (subDelayVal) subDelayVal.textContent = fmtDelay(subDelaySec); }
            function applySubDelay(newDelay) {
                subDelaySec = Math.max(-30, Math.min(30, parseFloat(newDelay.toFixed(1))));
                try { localStorage.setItem(subDelayKey, String(subDelaySec)); } catch (e) {}
                refreshDelayUi();
                // Native textTrack cues can't be retimed without re-loading the file.
                // For now we only persist the value; vidrock-native subs are already
                // synced so this delay is rarely needed.
            }
            subDelayMinus?.addEventListener('click', () => applySubDelay(subDelaySec - 0.5));
            subDelayPlus?.addEventListener('click', () => applySubDelay(subDelaySec + 0.5));
            subDelayReset?.addEventListener('click', () => applySubDelay(0));
            refreshDelayUi();

            // ===== Subtitle styling (size / colour / background) =====
            const cueStyleEl = document.createElement('style');
            document.head.appendChild(cueStyleEl);
            const ssKey = 'st_substyle_v1';
            let ss = { size: '100%', color: '#ffffff', bg: 'rgba(0,0,0,0.65)' };
            try { ss = Object.assign(ss, JSON.parse(localStorage.getItem(ssKey) || '{}')); } catch (e) {}
            function applyCueStyle() {
                cueStyleEl.textContent = '#player::cue{color:' + ss.color + ';background-color:' + ss.bg + ';font-size:' + ss.size + ';}';
            }
            function bindSs(id, key) {
                const row = document.getElementById(id);
                if (!row) return;
                row.querySelectorAll('button').forEach((b) => {
                    b.classList.toggle('on', b.dataset.v === ss[key]);
                    b.addEventListener('click', () => {
                        ss[key] = b.dataset.v;
                        row.querySelectorAll('button').forEach((x) => x.classList.remove('on'));
                        b.classList.add('on');
                        applyCueStyle();
                        try { localStorage.setItem(ssKey, JSON.stringify(ss)); } catch (e) {}
                    });
                });
            }
            bindSs('stSsSize', 'size');
            bindSs('stSsColor', 'color');
            bindSs('stSsBg', 'bg');
            applyCueStyle();

            // Boot
            renderServers();
            renderSeasonTabs();
            renderEpisodeCards();
            setPausedClass();
            updateVolIcon();
            showUi();
            loadStream(0);
        })();
        </script>
