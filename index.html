
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G9 Sports Live Player</title>
  
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- 1. Include Plyr CSS -->
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  
  <!-- 2. Include Hls.js and Plyr JS -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
  
  <style>
    :root {
      --plyr-color-main: #2979ff; /* Custom theme color, will be overridden dynamically */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }

    .video-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .plyr {
      width: 100%;
      height: 100%;
    }

    .plyr__video-wrapper {
      position: relative;
    }

    /* Premium Overlay Watermarks */
    .plyr-watermark-image {
      position: absolute;
      pointer-events: auto;
      z-index: 3;
      transition: bottom 0.3s ease, top 0.3s ease, left 0.3s ease, right 0.3s ease;
    }

    .plyr-watermark-text {
      position: absolute;
      pointer-events: auto;
      z-index: 3;
      font-size: 14px;
      font-weight: 600;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.9);
      transition: bottom 0.3s ease, top 0.3s ease, left 0.3s ease, right 0.3s ease;
    }

    .plyr-watermark-text a {
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .plyr-watermark-text a:hover {
      opacity: 0.8;
    }

    /* Position alignments relative to player viewport */
    .pos-top-left {
      top: 20px;
      left: 20px;
    }
    .pos-top-right {
      top: 20px;
      right: 20px;
    }
    .pos-bottom-left {
      bottom: 70px; /* shift above control bar */
      left: 20px;
    }
    .pos-bottom-right {
      bottom: 70px;
      right: 20px;
    }

    /* When Plyr hides control bar, slide bottom watermarks down */
    .plyr--hide-controls .pos-bottom-left {
      bottom: 20px;
    }
    .plyr--hide-controls .pos-bottom-right {
      bottom: 20px;
    }

    .error-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #000;
      color: #ff4d4d;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      z-index: 10;
    }

    .error-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #ff3d71;
    }
    
    .error-desc {
      font-size: 14px;
      color: #9fa8da;
      max-width: 400px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="video-container">
    <video id="video" playsinline crossorigin autoplay></video>
    
    <!-- Clean Error Overlay -->
    <div class="error-overlay" id="errorOverlay">
      <div class="error-title">⚠️ Playback Error</div>
      <div class="error-desc" id="errorMessage">Unable to stream the source channel.</div>
    </div>
  </div>

<script>
  const PROXY_BASE_URL = window.location.origin + '/api/stream';
  const SUPABASE_URL = "https://voocdrpetiyspuhyeapi.supabase.co";
  const SUPABASE_KEY = "sb_publishable_1rE1_AHPxoOv2AUpJtehJw_Gg0tj1xU";

  let currentChannel = 'g9sports';
  const video = document.getElementById('video');
  const errorOverlay = document.getElementById('errorOverlay');
  const errorMessage = document.getElementById('errorMessage');

  // Read channel from URL query string (?channel=channelname)
  const urlParams = new URLSearchParams(window.location.search);
  const urlChannel = urlParams.get('channel');
  if (urlChannel) {
    currentChannel = urlChannel.trim().toLowerCase();
  }

  // Domain whitelist check
  const whitelist = [
    'localhost',
    '127.0.0.1',
    'blogspot.com',
    'https://kaattakadapookie.blogspot.com',
  ];

  // Initialize stream
  initPlayer(currentChannel);

  function getStreamUrl(channel) {
    return `${PROXY_BASE_URL}?channel=${channel}`;
  }

  async function getPlayerSettings() {
    try {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/settings?id=eq.app_config`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });
      if (response.ok) {
        const rows = await response.json();
        if (rows && rows.length > 0) {
          return rows[0].data || {};
        }
      }
    } catch (err) {
      console.error('Error fetching player settings:', err);
    }
    return {};
  }

  async function initPlayer(channel) {
    const settings = await getPlayerSettings();

    // Referrer validation
    const dbAllowedDomains = settings.allowed_domains ? 
      settings.allowed_domains.split(',').map(d => d.trim().toLowerCase()).filter(Boolean) : [];
    const combinedWhitelist = [...whitelist, ...dbAllowedDomains];

    if (window.self !== window.top) { // If embedded in an iframe
      const parentReferrer = (document.referrer || '').toLowerCase();
      const isParentAllowed = combinedWhitelist.some(domain => parentReferrer.includes(domain));
      if (!isParentAllowed) {
        showError('Access Denied: This player is not authorized to be embedded on this domain.');
        return;
      }
    }

    // Apply custom player accent color
    const accentColor = settings.player_accent_color || '#2979ff';
    document.documentElement.style.setProperty('--plyr-color-main', accentColor);

    const streamUrl = getStreamUrl(channel);
    errorOverlay.style.display = 'none';

    const plyrControls = [
      'play-large',
      'play',
      'mute',
      'volume',
      'settings',
      'fullscreen'
    ];

    if (Hls.isSupported()) {
      const hls = new Hls({
        maxBufferLength: 10,
        maxMaxBufferLength: 15,
        liveSyncDuration: 6,
        enableWorker: true
      });

      hls.loadSource(streamUrl);
      hls.attachMedia(video);

      hls.on(Hls.Events.MEDIA_ATTACHED, () => {
        const player = new Plyr(video, {
          controls: plyrControls,
          settings: ['quality']
        });

        player.on('ready', () => {
          injectWatermarks(video, settings);
        });

        // Dynamic Quality Selector integration
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          const qualities = hls.levels.map((level) => level.height);
          qualities.unshift(0); // Add auto resolution option

          player.config.quality = {
            default: 0,
            options: qualities,
            forced: true,
            onChange: (newQuality) => {
              if (newQuality === 0) {
                hls.currentLevel = -1; // Auto level selection
              } else {
                hls.levels.forEach((level, index) => {
                  if (level.height === newQuality) {
                    hls.currentLevel = index;
                  }
                });
              }
            }
          };
        });
      });

      hls.on(Hls.Events.ERROR, function (event, data) {
        if (data.fatal) {
          switch (data.type) {
            case Hls.ErrorTypes.NETWORK_ERROR:
              let details = '';
              if (data.response && data.response.code) details += ` [Status ${data.response.code}]`;
              showError('Network connection failed. Verify the channel is live and domain is whitelisted.' + details);
              break;
            case Hls.ErrorTypes.MEDIA_ERROR:
              hls.recoverMediaError();
              break;
            default:
              showError('Unable to load stream.');
              break;
          }
        }
      });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      // Fallback for native Safari player (macOS / iOS)
      video.src = streamUrl;
      const player = new Plyr(video, {
        controls: plyrControls
      });

      player.on('ready', () => {
        injectWatermarks(video, settings);
      });

      video.addEventListener('loadedmetadata', function () {
        video.play().catch(err => console.log('Autoplay blocked.'));
      });
      video.addEventListener('error', function () {
        showError('Native stream loading failed.');
      });
    } else {
      showError('Your browser does not support HLS streaming.');
    }
  }

  function injectWatermarks(videoElement, settings) {
    const wrapper = videoElement.closest('.plyr__video-wrapper');
    if (!wrapper) return;

    // Remove existing watermarks if any
    const existingImgs = wrapper.querySelectorAll('.plyr-watermark-image');
    const existingTexts = wrapper.querySelectorAll('.plyr-watermark-text');
    existingImgs.forEach(el => el.remove());
    existingTexts.forEach(el => el.remove());

    // 1. Image Watermark
    if (settings.player_watermark_url) {
      const imgDiv = document.createElement('div');
      imgDiv.className = `plyr-watermark-image pos-${settings.player_watermark_position || 'top-right'}`;
      
      const img = document.createElement('img');
      img.src = settings.player_watermark_url;
      const widthVal = settings.player_watermark_width || '80';
      img.style.width = widthVal.endsWith('px') ? widthVal : `${widthVal}px`;
      img.style.opacity = settings.player_watermark_opacity || '0.8';
      img.style.display = 'block';
      
      if (settings.player_watermark_link) {
        const link = document.createElement('a');
        link.href = settings.player_watermark_link;
        link.target = '_blank';
        link.style.cursor = 'pointer';
        link.appendChild(img);
        imgDiv.appendChild(link);
      } else {
        imgDiv.appendChild(img);
      }
      wrapper.appendChild(imgDiv);
    }

    // 2. Text Watermark
    if (settings.player_text_watermark) {
      const textDiv = document.createElement('div');
      textDiv.className = `plyr-watermark-text pos-${settings.player_text_position || 'bottom-left'}`;
      
      const txtSpan = document.createElement('span');
      txtSpan.textContent = settings.player_text_watermark;
      txtSpan.style.color = settings.player_text_color || '#ffffff';
      
      if (settings.player_text_link) {
        const link = document.createElement('a');
        link.href = settings.player_text_link;
        link.target = '_blank';
        link.style.color = settings.player_text_color || '#ffffff';
        link.style.textDecoration = 'none';
        link.style.cursor = 'pointer';
        link.appendChild(txtSpan);
        textDiv.appendChild(link);
      } else {
        textDiv.appendChild(txtSpan);
      }
      wrapper.appendChild(textDiv);
    }
  }

  function showError(msg) {
    errorMessage.textContent = msg;
    errorOverlay.style.display = 'flex';
  }
</script>
</body>
</html>
